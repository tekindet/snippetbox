services:
  snippetbox:
    container_name: snippetbox
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env

  postgres:
    image: "postgres:16-alpine"
    hostname: "postgres"
    environment:
      POSTGRES_USER: snippetbox
      POSTGRES_PASSWORD: snippetbox
      POSTGRES_DB: snippetbox
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snippetbox"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    container_name: adminer
    image: dockette/adminer
    restart: always
    ports:
      - "8085:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
